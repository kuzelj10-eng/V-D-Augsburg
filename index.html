<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadt Augsburg - Baustellenmanagement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; -webkit-print-color-adjust: exact; }
        .bg-augsburg { background-color: #8b0000; }
        .text-augsburg { color: #8b0000; }
        .border-augsburg { border-color: #8b0000; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const DISTRICTS = [
            'INNENSTADT', 'OBERHAUSEN', 'BÄRENKELLER', 'FIRNHABERAU', 'HAMMERSCHMIEDE', 
            'LECHHAUSEN', 'HOCHZOLL', 'HERRENBACH', 'SPICKEL', 'HOCHFELD', 
            'ANTONSVIERTEL', 'ROSENAU-', 'THELOTTVIERTEL', 'PFERSEE', 'KRIEGSHABER', 
            'GÖGGINGEN', 'INNINGEN', 'BERGHEIM', 'HAUNSTETTEN', 'SIEBENBRUNN'
        ];

        // Die Augsburger Zirbelnuss als SVG Komponente
        const ZirbelLogo = ({ className = "w-8 h-8" }) => (
            <svg viewBox="0 0 100 100" className={className} fill="currentColor">
                <path d="M50 5 L35 25 L50 15 L65 25 Z M30 30 L15 55 L30 45 L45 55 L30 30 Z M70 30 L85 55 L70 45 L55 55 L70 30 Z M50 35 L35 65 L50 55 L65 65 L50 35 Z M30 65 L10 95 L30 85 L50 95 L30 65 Z M70 65 L90 95 L70 85 L50 95 L70 65 Z M45 92 L55 92 L55 100 L45 100 Z" />
            </svg>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('DASHBOARD');
            const [entries, setEntries] = useState([]);
            const [filterDist, setFilterDist] = useState('ALLE');
            const [captureData, setCaptureData] = useState({ street: '', district: DISTRICTS[0], description: '', img: null });
            const fileRef = useRef();

            useEffect(() => {
                const saved = localStorage.getItem('augs_v3_data');
                if (saved) setEntries(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('augs_v3_data', JSON.stringify(entries));
            }, [entries]);

            const handleLogin = (e) => {
                e.preventDefault();
                const name = e.target.name_in.value;
                const role = e.target.role_in.value;
                if (name) setUser({ name, role });
            };

            const toggleStatus = (index) => {
                const newEntries = [...entries];
                newEntries[index].status = newEntries[index].status === 'AKTUELL' ? 'ERLEDIGT' : 'AKTUELL';
                setEntries(newEntries);
            };

            const addEntry = () => {
                if (captureData.street && captureData.img) {
                    const newEntry = { ...captureData, status: 'AKTUELL', time: new Date().toLocaleString('de-DE') };
                    setEntries([newEntry, ...entries]);
                    setCaptureData({ street: '', district: DISTRICTS[0], description: '', img: null });
                    setView('DASHBOARD');
                }
            };

            if (!user) {
                return (
                    <div className="min-h-screen bg-gray-100 flex items-center justify-center p-6">
                        <div className="w-full max-w-sm bg-white shadow-2xl rounded-2xl overflow-hidden">
                            <div className="bg-augsburg p-12 text-white text-center">
                                <ZirbelLogo className="w-20 h-20 mx-auto mb-6" />
                                <h1 className="text-2xl font-black uppercase tracking-tight">Stadt Augsburg</h1>
                                <p className="text-[10px] font-bold uppercase tracking-[0.3em] mt-2 opacity-70">Ordnungsamt Portal</p>
                            </div>
                            <form onSubmit={handleLogin} className="p-8 space-y-6">
                                <input name="name_in" required className="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl font-bold uppercase text-xs" placeholder="Mitarbeiter Name" />
                                <select name="role_in" className="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl font-bold uppercase text-xs">
                                    <option value="field">Außendienst</option>
                                    <option value="office">Innendienst</option>
                                </select>
                                <button type="submit" className="w-full py-4 bg-black text-white font-black uppercase tracking-widest rounded-xl shadow-lg">Anmelden</button>
                            </form>
                        </div>
                    </div>
                );
            }

            const filteredEntries = entries.filter(e => filterDist === 'ALLE' || e.district === filterDist);

            return (
                <div className="max-w-md mx-auto h-screen bg-white shadow-2xl flex flex-col relative border-x border-gray-100 overflow-hidden">
                    
                    {/* Header */}
                    <header className="h-20 bg-white border-b border-gray-100 flex items-center justify-between px-6 shrink-0 no-print">
                        <div className="flex items-center gap-3">
                            <ZirbelLogo className="text-augsburg w-10 h-10" />
                            <div><h1 className="text-sm font-black uppercase leading-tight">Augsburg</h1><p className="text-[8px] font-bold text-gray-400 uppercase tracking-widest">{user.role === 'field' ? 'Mobil' : 'Zentrale'}</p></div>
                        </div>
                        <button onClick={() => setUser(null)} className="p-2 text-gray-300 hover:text-augsburg transition-colors"><i className="lucide-log-out"></i></button>
                    </header>

                    {/* Main Content */}
                    <div className="flex-1 overflow-y-auto pb-24">
                        
                        {/* VIEW: DASHBOARD */}
                        {view === 'DASHBOARD' && (
                            <div className="p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black uppercase tracking-tighter">Aufnahmen</h2>
                                    <button onClick={() => setView('AUFNAHME')} className="size-12 bg-augsburg text-white rounded-full flex items-center justify-center shadow-lg"><i className="lucide-plus"></i></button>
                                </div>

                                {/* Filter Bar */}
                                <div className="mb-8 relative no-print">
                                    <i className="lucide-filter absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                                    <select 
                                        value={filterDist} 
                                        onChange={e => setFilterDist(e.target.value)}
                                        className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-[10px] font-bold uppercase tracking-widest outline-none focus:border-augsburg transition-all"
                                    >
                                        <option value="ALLE">Alle Stadtbezirke</option>
                                        {DISTRICTS.map(d => <option key={d} value={d}>{d}</option>)}
                                    </select>
                                </div>

                                {filteredEntries.length === 0 ? (
                                    <div className="mt-20 text-center"><i className="lucide-frown text-4xl text-gray-200 mb-4 inline-block"></i><p className="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Keine Einträge gefunden</p></div>
                                ) : (
                                    <div className="space-y-4">
                                        {filteredEntries.map((e, idx) => (
                                            <div key={idx} className="bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all">
                                                <img src={e.img} className="w-full h-40 object-cover" />
                                                <div className="p-4 space-y-3">
                                                    <div className="flex justify-between items-start">
                                                        <div><h3 className="text-xs font-black uppercase">{e.street}</h3><p className="text-[9px] font-bold text-gray-400 uppercase tracking-wider">{e.district}</p></div>
                                                        <button 
                                                            onClick={() => toggleStatus(entries.indexOf(e))}
                                                            className={`px-3 py-1 rounded-full text-[8px] font-black uppercase border transition-all ${e.status === 'AKTUELL' ? 'bg-red-50 text-red-800 border-red-100' : 'bg-green-50 text-green-800 border-green-100'}`}
                                                        >
                                                            {e.status}
                                                        </button>
                                                    </div>
                                                    <p className="text-[10px] text-gray-500 italic line-clamp-2">{e.description || "Keine Bemerkung"}</p>
                                                    <div className="text-[8px] font-bold text-gray-300 uppercase">{e.time}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VIEW: AUFNAHME */}
                        {view === 'AUFNAHME' && (
                            <div className="p-6 space-y-6 animate-in slide-in-from-right duration-300">
                                <div className="flex items-center gap-4 mb-4"><button onClick={() => setView('DASHBOARD')} className="p-2 text-gray-300"><i className="lucide-arrow-left"></i></button><h2 className="text-sm font-black uppercase">Aufnahme</h2></div>
                                <div onClick={() => fileRef.current.click()} className="aspect-square bg-gray-50 border-2 border-dashed border-gray-100 rounded-3xl flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group border-augsburg">
                                    {captureData.img ? <img src={captureData.img} className="w-full h-full object-cover" /> : 
                                    <div className="text-center"><i className="lucide-camera text-4xl text-augsburg mb-2"></i><p className="text-[10px] font-bold text-gray-300 uppercase">Foto öffnen</p></div>}
                                    <input type="file" ref={fileRef} className="hidden" accept="image/*" capture="environment" onChange={e => {
                                        const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onloadend = () => setCaptureData({...captureData, img: r.result}); r.readAsDataURL(f); }
                                    }} />
                                </div>
                                <input value={captureData.street} onChange={e => setCaptureData({...captureData, street: e.target.value})} placeholder="ADRESSE / STANDORT" className="w-full p-4 border border-gray-100 rounded-xl text-xs font-bold uppercase outline-none focus:border-augsburg" />
                                <select value={captureData.district} onChange={e => setCaptureData({...captureData, district: e.target.value})} className="w-full p-4 border border-gray-100 rounded-xl text-xs font-bold uppercase outline-none focus:border-augsburg">
                                    {DISTRICTS.map(d => <option key={d} value={d}>{d}</option>)}
                                </select>
                                <textarea value={captureData.description} onChange={e => setCaptureData({...captureData, description: e.target.value})} placeholder="ZUSÄTZLICHE FESTSTELLUNGEN..." className="w-full p-4 border border-gray-100 rounded-xl text-sm italic min-h-[100px] outline-none" />
                                <button onClick={addEntry} className="w-full py-5 bg-augsburg text-white font-black uppercase tracking-[0.2em] rounded-xl shadow-xl active:scale-95 transition-all">Abschließen</button>
                            </div>
                        )}

                        {/* VIEW: BERICHTE */}
                        {view === 'BERICHTE' && (
                            <div className="p-6 animate-in fade-in duration-500">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-xl font-black uppercase tracking-tighter">Berichte</h2>
                                    <button onClick={() => window.print()} className="p-3 bg-gray-50 rounded-xl text-gray-400 hover:text-augsburg transition-colors"><i className="lucide-printer"></i></button>
                                </div>
                                
                                <div className="bg-white border border-gray-100 rounded-2xl overflow-hidden print:border-none shadow-sm">
                                    <div className="p-4 bg-gray-50 text-[10px] font-black uppercase tracking-widest text-gray-400 border-b border-gray-100">Journal Übersicht</div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-[9px] uppercase font-bold">
                                            <thead><tr className="bg-gray-50 border-b border-gray-100"><th className="p-4">Straße</th><th className="p-4">Bezirk</th><th className="p-4">Status</th></tr></thead>
                                            <tbody className="divide-y divide-gray-50">
                                                {entries.map((e, i) => (
                                                    <tr key={i} className="hover:bg-gray-50/50">
                                                        <td className="p-4">{e.street}</td>
                                                        <td className="p-4 text-gray-400">{e.district}</td>
                                                        <td className="p-4"><span className={e.status === 'AKTUELL' ? 'text-red-700' : 'text-green-700'}>{e.status}</span></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <p className="mt-8 text-[8px] font-bold text-gray-300 uppercase leading-relaxed uppercase">Dokumentationssystem Stadt Augsburg<br/>Ordnungsamt / Baustellenüberwachung</p>
                            </div>
                        )}

                    </div>

                    {/* Bottom Nav */}
                    <nav className="h-20 bg-white border-t border-gray-100 flex items-center justify-around px-2 pb-safe shrink-0 no-print">
                        <button onClick={() => setView('DASHBOARD')} className={`flex flex-col items-center gap-1 flex-1 ${view === 'DASHBOARD' ? 'text-augsburg' : 'text-gray-300'}`}><i className="lucide-layout-grid"></i><span className="text-[8px] font-black uppercase">Dashboard</span></button>
                        <button onClick={() => setView('AUFNAHME')} className={`flex flex-col items-center gap-1 flex-1 ${view === 'AUFNAHME' ? 'text-augsburg' : 'text-gray-300'}`}><i className="lucide-camera"></i><span className="text-[8px] font-black uppercase">Foto</span></button>
                        <button onClick={() => setView('BERICHTE')} className={`flex flex-col items-center gap-1 flex-1 ${view === 'BERICHTE' ? 'text-augsburg' : 'text-gray-300'}`}><i className="lucide-file-text"></i><span className="text-[8px] font-black uppercase">Berichte</span></button>
                    </nav>

                    {/* Print Only Header */}
                    <div className="hidden print:block p-10 bg-white">
                        <div className="flex items-center gap-6 border-b-4 border-augsburg pb-6">
                            <ZirbelLogo className="w-16 h-16 text-augsburg" />
                            <div><h1 className="text-4xl font-black uppercase">Journal-Bericht</h1><p className="text-xl font-bold italic">Stadt Augsburg — Ordnungsamt</p></div>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
