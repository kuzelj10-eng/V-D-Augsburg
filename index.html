<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VÜD Augsburg - Premium Portal</title>
    
    <link rel="icon" type="image/png" href="logo.PNG">
    <link rel="apple-touch-icon" href="logo.PNG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap');
        :root { --gold: #D4AF37; --black: #000000; }
        body { font-family: 'Inter', sans-serif; background-color: var(--black); color: #ffffff; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-border { border: 1px solid var(--gold); }
        .gold-text { color: var(--gold); }
        .gold-button {
            background: linear-gradient(135deg, #D4AF37 0%, #F1D37E 50%, #D4AF37 100%);
            color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em;
        }
        .gold-glow-focus:focus { box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); border-color: var(--gold); }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const DISTRICTS = ['INNENSTADT', 'OBERHAUSEN', 'BÄRENKELLER', 'FIRNHABERAU', 'HAMMERSCHMIEDE', 'LECHHAUSEN', 'HOCHZOLL', 'HERRENBACH', 'SPICKEL', 'HOCHFELD', 'ANTONSVIERTEL', 'ROSENAU-', 'THELOTTVIERTEL', 'PFERSEE', 'KRIEGSHABER', 'GÖGGINGEN', 'INNINGEN', 'BERGHEIM', 'HAUNSTETTEN', 'SIEBENBRUNN'];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('DASHBOARD');
            const [entries, setEntries] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isCompressing, setIsCompressing] = useState(false);
            const [captureData, setCaptureData] = useState({ street: '', district: DISTRICTS[0], description: '', img: null });
            const fileRef = useRef();

            useEffect(() => {
                const saved = localStorage.getItem('vud_v5_full_data');
                if (saved) setEntries(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('vud_v5_full_data', JSON.stringify(entries));
            }, [entries]);

            // --- PHOTO FIX ---
            const processImage = (file) => {
                if (!file) return;
                setIsCompressing(true);
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const MAX_WIDTH = 1280;
                        let w = img.width, h = img.height;
                        if (w > MAX_WIDTH) { h = Math.round((MAX_WIDTH / w) * h); w = MAX_WIDTH; }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        setCaptureData(prev => ({ ...prev, img: canvas.toDataURL('image/jpeg', 0.7) }));
                        setIsCompressing(false);
                    };
                };
                reader.readAsDataURL(file);
            };

            const toggleStatus = (id) => {
                setEntries(prev => prev.map(e => e.id === id ? { ...e, status: e.status === 'ERLEDIGT' ? 'AKTIV' : 'ERLEDIGT' } : e));
            };

            const addEntry = () => {
                if (captureData.street && captureData.img) {
                    const newEntry = { ...captureData, id: Date.now(), status: 'AKTIV', timestamp: new Date().toLocaleString('de-DE') };
                    setEntries([newEntry, ...entries]);
                    setCaptureData({ street: '', district: DISTRICTS[0], description: '', img: null });
                    setView('DASHBOARD');
                }
            };

            // Filter & Sortierung Logik
            const filteredAndSortedEntries = useMemo(() => {
                return entries
                    .filter(e => 
                        e.street.toLowerCase().includes(searchTerm.toLowerCase()) || 
                        e.district.toLowerCase().includes(searchTerm.toLowerCase())
                    )
                    .sort((a, b) => {
                        if (a.status === b.status) return 0;
                        return a.status === 'AKTIV' ? -1 : 1;
                    });
            }, [entries, searchTerm]);

            if (!user) {
                return (
                    <div className="min-h-screen bg-black flex flex-col items-center justify-center p-8">
                        <img src="logo.PNG" className="w-40 h-40 mb-10" />
                        <div className="w-full max-w-sm space-y-6">
                            <h1 className="font-luxury text-2xl gold-text text-center tracking-widest uppercase">VÜD LOGIN</h1>
                            <input id="l_name" placeholder="DIENSTNUMMER" className="w-full p-5 bg-zinc-900 border border-zinc-800 rounded-none gold-glow-focus uppercase text-xs font-bold outline-none text-white" />
                            <button onClick={() => { if(document.getElementById('l_name').value) setUser({name: document.getElementById('l_name').value}) }} className="w-full py-5 gold-button">Eintreten</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-black flex flex-col relative border-x border-zinc-900">
                    <header className="h-20 bg-black/90 backdrop-blur-md border-b border-zinc-900 px-6 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            <img src="logo.PNG" className="h-10 w-10 object-contain" />
                            <span className="font-luxury text-lg gold-text">VÜD</span>
                        </div>
                        <div className="flex gap-4">
                           <button onClick={() => setView('AUFNAHME')} className="gold-text p-2"><i className="lucide-camera"></i></button>
                           <button onClick={() => setUser(null)} className="text-zinc-500 p-2"><i className="lucide-log-out"></i></button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-24">
                        {view === 'DASHBOARD' && (
                            <div className="p-6 space-y-6">
                                {/* Search Bar */}
                                <div className="relative">
                                    <i className="lucide-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 w-4 h-4"></i>
                                    <input 
                                        value={searchTerm} 
                                        onChange={e => setSearchTerm(e.target.value)}
                                        placeholder="Straße oder Bezirk suchen..." 
                                        className="w-full pl-12 pr-4 py-4 bg-zinc-900/50 border border-zinc-800 rounded-2xl text-xs font-bold gold-glow-focus outline-none text-white"
                                    />
                                </div>

                                <h2 className="font-luxury text-xl gold-text mb-2">Einsatzliste</h2>

                                <div className="grid grid-cols-1 gap-6">
                                    {filteredAndSortedEntries.map(e => (
                                        <div key={e.id} className={`bg-zinc-900/40 border transition-all duration-500 rounded-3xl overflow-hidden ${e.status === 'ERLEDIGT' ? 'border-zinc-900 opacity-40' : 'border-zinc-800'}`}>
                                            <div className="relative">
                                                <img src={e.img} className="w-full aspect-video object-cover" />
                                                <button 
                                                    onClick={() => toggleStatus(e.id)}
                                                    className={`absolute top-4 right-4 size-10 rounded-full flex items-center justify-center border-2 backdrop-blur-md active:scale-90 transition-all ${e.status === 'AKTIV' ? 'border-[#D4AF37] gold-text bg-black/40' : 'border-green-500 text-green-500 bg-green-500/10'}`}
                                                >
                                                    <i className={e.status === 'AKTIV' ? 'lucide-alert-circle' : 'lucide-check'}></i>
                                                </button>
                                            </div>
                                            <div className="p-5">
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <h3 className={`text-xs font-black uppercase mb-1 ${e.status === 'AKTIV' ? 'gold-text' : 'text-zinc-500'}`}>{e.street}</h3>
                                                        <p className="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">{e.district}</p>
                                                    </div>
                                                    <span className="text-[7px] font-mono text-zinc-700">{e.timestamp}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'AUFNAHME' && (
                            <div className="p-6 space-y-6 animate-in slide-in-from-right duration-300">
                                <div className="flex items-center gap-4 mb-2">
                                    <button onClick={() => setView('DASHBOARD')} className="p-2 text-zinc-500"><i className="lucide-arrow-left"></i></button>
                                    <h2 className="font-luxury gold-text tracking-widest text-sm uppercase">PROTOKOLL</h2>
                                </div>
                                <div onClick={() => fileRef.current.click()} className="aspect-square bg-zinc-900/50 border border-zinc-800 rounded-3xl flex flex-col items-center justify-center cursor-pointer overflow-hidden relative">
                                    {isCompressing ? <i className="lucide-loader-2 animate-spin gold-text text-3xl"></i> :
                                     captureData.img ? <img src={captureData.img} className="w-full h-full object-cover" /> :
                                     <div className="text-center font-luxury gold-text text-[10px] animate-pulse">Kamera öffnen</div>}
                                    <input type="file" accept="image/*" capture="environment" className="hidden" ref={fileRef} onChange={e => processImage(e.target.files[0])} />
                                </div>
                                <div className="space-y-4">
                                    <input value={captureData.street} onChange={e => setCaptureData({...captureData, street: e.target.value.toUpperCase()})} placeholder="ADRESSE" className="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-xl text-xs font-bold outline-none uppercase gold-glow-focus" />
                                    <select value={captureData.district} onChange={e => setCaptureData({...captureData, district: e.target.value})} className="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-xl text-[10px] font-black gold-text uppercase outline-none">
                                        {DISTRICTS.map(d => <option key={d} value={d} className="bg-black">{d}</option>)}
                                    </select>
                                    <textarea value={captureData.description} onChange={e => setCaptureData({...captureData, description: e.target.value})} placeholder="BEMERKUNG..." className="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-xl text-xs italic min-h-[100px] outline-none" />
                                    <button onClick={addEntry} disabled={isCompressing || !captureData.img} className="w-full py-5 gold-button rounded-xl shadow-lg active:scale-95 disabled:opacity-30">Fall Absenden</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="h-20 bg-black/90 backdrop-blur-md border-t border-zinc-900 flex items-center justify-around z-50">
                        <button onClick={() => setView('DASHBOARD')} className={`flex flex-col items-center gap-1 flex-1 ${view === 'DASHBOARD' ? 'gold-text' : 'text-zinc-600'}`}><i data-lucide="layout-grid"></i><span className="text-[8px] font-black uppercase tracking-widest">Journal</span></button>
                        <button onClick={() => setView('AUFNAHME')} className={`flex flex-col items-center gap-1 flex-1 ${view === 'AUFNAHME' ? 'gold-text' : 'text-zinc-600'}`}><i data-lucide="camera"></i><span className="text-[8px] font-black uppercase tracking-widest">Foto</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 200);
    </script>
</body>
</html>
