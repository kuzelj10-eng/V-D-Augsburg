<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VÜD PRO - Multi-Foto System</title>
    
    <link rel="icon" type="image/png" href="logo.PNG">
    <link rel="apple-touch-icon" href="logo.PNG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap');
        :root { --gold: #D4AF37; --black: #000000; }
        body { font-family: 'Inter', sans-serif; background-color: var(--black); color: #ffffff; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-border { border: 1px solid var(--gold); }
        .gold-text { color: var(--gold); }
        .gold-button { background: linear-gradient(135deg, #D4AF37 0%, #F1D37E 50%, #D4AF37 100%); color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; }
        .search-glow:focus { box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); border-color: var(--gold); }
        .status-erledigt { opacity: 0.4; filter: grayscale(0.8); }
        .no-print { display: block; }
        @media print { .no-print { display: none !important; } }
        
        /* Thumbnail Animation */
        .img-item { animation: scaleIn 0.3s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- INDEXED DB ENGINE ---
        const DB_NAME = 'VUD_Augsburg_DB';
        const STORE_NAME = 'entries';

        const initDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
            });
        };

        const getAllEntries = async () => {
            const db = await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
            });
        };

        const saveEntry = async (entry) => {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(entry);
            return new Promise((resolve) => tx.oncomplete = () => resolve());
        };

        const deleteEntry = async (id) => {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).delete(id);
            return new Promise((resolve) => tx.oncomplete = () => resolve());
        };

        const DISTRICTS = ['INNENSTADT', 'OBERHAUSEN', 'BÄRENKELLER', 'FIRNHABERAU', 'HAMMERSCHMIEDE', 'LECHHAUSEN', 'HOCHZOLL', 'HERRENBACH', 'SPICKEL', 'HOCHFELD', 'ANTONSVIERTEL', 'ROSENAU-', 'THELOTTVIERTEL', 'PFERSEE', 'KRIEGSHABER', 'GÖGGINGEN', 'INNINGEN', 'BERGHEIM', 'HAUNSTETTEN', 'SIEBENBRUNN'];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('DASHBOARD');
            const [entries, setEntries] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isCompressing, setIsCompressing] = useState(false);
            const [captureData, setCaptureData] = useState({ street: '', district: DISTRICTS[0], description: '', images: [] });
            const fileRef = useRef();

            useEffect(() => {
                getAllEntries().then(data => setEntries(data.sort((a,b) => b.id - a.id)));
                if (window.lucide) window.lucide.createIcons();
            }, [view, user]);

            const processImage = (file) => {
                if (!file) return;
                setIsCompressing(true);
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const MAX_WIDTH = 1000; // Aggressive Drosselung
                        let w = img.width, h = img.height;
                        if (w > MAX_WIDTH) { h = Math.round((MAX_WIDTH / w) * h); w = MAX_WIDTH; }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const compressed = canvas.toDataURL('image/jpeg', 0.5); // 50% Qualität
                        setCaptureData(prev => ({ ...prev, images: [...prev.images, compressed] }));
                        setIsCompressing(false);
                    };
                };
                reader.readAsDataURL(file);
            };

            const toggleStatus = async (id) => {
                const updatedEntries = entries.map(e => {
                    if (e.id === id) {
                        const updated = { ...e, status: e.status === 'ERLEDIGT' ? 'AKTIV' : 'ERLEDIGT' };
                        saveEntry(updated);
                        return updated;
                    }
                    return e;
                });
                setEntries(updatedEntries);
            };

            const addEntry = async () => {
                if (captureData.street && captureData.images.length > 0) {
                    const newEntry = { ...captureData, id: Date.now(), status: 'AKTIV', timestamp: new Date().toLocaleString('de-DE') };
                    await saveEntry(newEntry);
                    setCaptureData({ street: '', district: DISTRICTS[0], description: '', images: [] });
                    setView('DASHBOARD');
                }
            };

            const filteredEntries = useMemo(() => {
                const s = searchTerm.toLowerCase();
                return entries
                    .filter(e => e.street.toLowerCase().includes(s) || e.district.toLowerCase().includes(s))
                    .sort((a, b) => (a.status === b.status ? b.id - a.id : a.status === 'AKTIV' ? -1 : 1));
            }, [entries, searchTerm]);

            if (!user) {
                return (
                    <div className="min-h-screen bg-black flex flex-col items-center justify-center p-8">
                        <img src="logo.PNG" className="w-40 h-40 mb-12 shadow-[0_0_50px_rgba(212,175,55,0.15)]" />
                        <div className="w-full max-w-sm space-y-6">
                            <h1 className="font-luxury text-2xl gold-text text-center tracking-widest">PREMIUM LOGIN</h1>
                            <input id="l_name" placeholder="DIENST-ID" className="w-full p-5 bg-zinc-900 border border-zinc-800 rounded-none gold-text uppercase text-xs font-bold outline-none search-glow" />
                            <button onClick={() => { if(document.getElementById('l_name').value) setUser({name: document.getElementById('l_name').value}) }} className="w-full py-5 gold-button">Eintreten</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-black flex flex-col relative border-x border-zinc-900">
                    <header className="h-20 bg-black border-b border-zinc-900 px-6 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <img src="logo.PNG" className="h-10 w-10 object-contain" />
                            <span className="font-luxury text-xl gold-text tracking-tighter">VÜD</span>
                        </div>
                        <button onClick={() => setUser(null)} className="text-zinc-600"><i className="lucide-log-out"></i></button>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-32">
                        {view === 'DASHBOARD' && (
                            <div className="p-5 space-y-6">
                                <div className="relative pt-2">
                                    <i className="lucide-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-600 w-4 h-4"></i>
                                    <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Filter: Straße / Bezirk..." className="w-full pl-12 pr-4 py-4 bg-zinc-900 border border-zinc-800 rounded-2xl text-[11px] font-bold gold-text uppercase outline-none search-glow" />
                                </div>

                                <div className="flex items-center justify-between"><h2 className="font-luxury text-lg text-white">Journal</h2><button onClick={() => setView('AUFNAHME')} className="size-12 gold-button rounded-full flex items-center justify-center shadow-lg"><i className="lucide-plus"></i></button></div>

                                <div className="grid grid-cols-1 gap-6">
                                    {filteredEntries.map(e => (
                                        <div key={e.id} className={`bg-zinc-900/30 border rounded-[2rem] overflow-hidden transition-all duration-300 ${e.status === 'ERLEDIGT' ? 'status-erledigt border-zinc-900' : 'border-zinc-800 shadow-2xl'}`}>
                                            <div className="relative">
                                                <img src={e.images[0]} className="w-full aspect-[4/3] object-cover" />
                                                {e.images.length > 1 && <span className="absolute bottom-4 left-4 px-3 py-1 bg-black/60 backdrop-blur-md rounded-full text-[8px] font-bold gold-text">+{e.images.length - 1} FOTOS</span>}
                                                <button onClick={() => toggleStatus(e.id)} className={`absolute top-4 right-4 size-10 rounded-full flex items-center justify-center border-2 backdrop-blur-md transition-all ${e.status === 'AKTIV' ? 'border-[#D4AF37] gold-text bg-black/40 shadow-[0_0_15px_rgba(212,175,55,0.4)]' : 'border-green-500 text-green-500 bg-green-500/10'}`}><i className={e.status === 'AKTIV' ? 'lucide-alert-circle' : 'lucide-check'}></i></button>
                                            </div>
                                            <div className="p-5 space-y-3">
                                                <div className="flex justify-between items-start">
                                                    <div><h3 className={`text-xs font-black uppercase mb-1 ${e.status === 'AKTIV' ? 'gold-text' : 'text-zinc-500'}`}>{e.street}</h3><p className="text-[9px] font-bold text-zinc-600 uppercase tracking-widest">{e.district}</p></div>
                                                    <span className="text-[7px] font-mono text-zinc-700">{e.timestamp}</span>
                                                </div>
                                                <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-none">
                                                    {e.images.map((img, i) => <img key={i} src={img} className="size-8 rounded-md object-cover border border-zinc-800" />)}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'AUFNAHME' && (
                            <div className="p-6 space-y-6">
                                <div className="flex items-center gap-4 mb-2"><button onClick={() => setView('DASHBOARD')} className="p-2 text-zinc-600"><i className="lucide-arrow-left"></i></button><h2 className="text-sm font-luxury gold-text tracking-widest">PROTOKOLL</h2></div>
                                
                                <div className="grid grid-cols-3 gap-3">
                                    <div onClick={() => fileRef.current.click()} className="aspect-square bg-zinc-900 border border-zinc-800 rounded-2xl flex flex-col items-center justify-center cursor-pointer shadow-inner hover:border-[#D4AF37] transition-all">
                                        {isCompressing ? <i className="lucide-loader-2 animate-spin gold-text"></i> : <i className="lucide-camera text-xl gold-text"></i>}
                                        <input type="file" accept="image/*" capture="environment" className="hidden" ref={fileRef} onChange={e => processImage(e.target.files[0])} />
                                    </div>
                                    {captureData.images.map((img, i) => (
                                        <div key={i} className="aspect-square rounded-2xl overflow-hidden relative img-item group">
                                            <img src={img} className="w-full h-full object-cover" />
                                            <button onClick={() => setCaptureData(prev => ({...prev, images: prev.images.filter((_, idx) => idx !== i)}))} className="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i className="lucide-trash-2 text-red-500"></i></button>
                                        </div>
                                    ))}
                                </div>

                                <div className="space-y-4 pt-4">
                                    <input value={captureData.street} onChange={e => setCaptureData({...captureData, street: e.target.value.toUpperCase()})} placeholder="ADRESSE / STANDORT" className="w-full p-5 bg-zinc-900 border border-zinc-800 rounded-2xl text-xs font-bold outline-none uppercase gold-text search-glow" />
                                    <select value={captureData.district} onChange={e => setCaptureData({...captureData, district: e.target.value})} className="w-full p-5 bg-zinc-900 border border-zinc-800 rounded-2xl text-[10px] font-black gold-text uppercase outline-none">
                                        {DISTRICTS.map(d => <option key={d} value={d} className="bg-black">{d}</option>)}
                                    </select>
                                    <textarea value={captureData.description} onChange={e => setCaptureData({...captureData, description: e.target.value})} placeholder="BEMERKUNGEN..." className="w-full p-5 bg-zinc-900 border border-zinc-800 rounded-2xl text-xs italic min-h-[100px] outline-none" />
                                    <button onClick={addEntry} disabled={captureData.images.length === 0} className="w-full py-6 gold-button rounded-2xl shadow-xl disabled:opacity-20 transition-all">SIGNIEREN ({captureData.images.length} FOTOS)</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="h-24 bg-black border-t border-zinc-900 flex items-center justify-around px-2 z-50 fixed bottom-0 w-full max-w-md no-print shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
                        <button onClick={() => setView('DASHBOARD')} className={`flex flex-col items-center gap-1 flex-1 py-2 ${view === 'DASHBOARD' ? 'gold-text' : 'text-zinc-600'}`}><i data-lucide="layout-grid"></i><span className="text-[8px] font-black uppercase tracking-widest">Journal</span></button>
                        <button onClick={() => setView('AUFNAHME')} className={`flex flex-col items-center gap-1 flex-1 py-2 ${view === 'AUFNAHME' ? 'gold-text' : 'text-zinc-600'}`}><i data-lucide="camera"></i><span className="text-[8px] font-black uppercase tracking-widest">Foto</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
