<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VÜD PRO - High-Security Portal</title>
    
    <!-- PWA & Icon Setup -->
    <link rel="icon" type="image/png" href="logo.PNG">
    <link rel="apple-touch-icon" href="logo.PNG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap');
        
        :root { --gold: #D4AF37; --black: #000000; }
        body { font-family: 'Inter', sans-serif; background-color: var(--black); color: #ffffff; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-border { border: 1px solid var(--gold); }
        .gold-text { color: var(--gold); }
        .gold-button { background: linear-gradient(135deg, #D4AF37 0%, #F1D37E 50%, #D4AF37 100%); color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; }
        .search-glow:focus { box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); border-color: var(--gold); }
        .status-erledigt { opacity: 0.3; filter: grayscale(1); }
        .modal-entry { animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const DB_NAME = 'VUD_Augsburg_Final_DB';
        const STORE_NAME = 'entries';
        const DB_VERSION = 1;

        const initDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
            });
        };

        const getAllEntries = async () => {
            const db = await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
            });
        };

        const saveEntry = async (entry) => {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(entry);
            return new Promise((resolve) => tx.oncomplete = () => resolve());
        };

        const DISTRICTS = ['INNENSTADT', 'OBERHAUSEN', 'BÄRENKELLER', 'FIRNHABERAU', 'HAMMERSCHMIEDE', 'LECHHAUSEN', 'HOCHZOLL', 'HERRENBACH', 'SPICKEL', 'HOCHFELD', 'ANTONSVIERTEL', 'ROSENAU-', 'THELOTTVIERTEL', 'PFERSEE', 'KRIEGSHABER', 'GÖGGINGEN', 'INNINGEN', 'BERGHEIM', 'HAUNSTETTEN', 'SIEBENBRUNN'];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('DASHBOARD');
            const [entries, setEntries] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isCompressing, setIsCompressing] = useState(false);
            const [isPersistent, setIsPersistent] = useState(false);
            const [zoomPhoto, setZoomPhoto] = useState(null);
            const [captureData, setCaptureData] = useState({ street: '', district: DISTRICTS[0], description: '', images: [] });
            const fileRef = useRef();

            // --- ERZWUNGENE PERSISTENZ BEIM START ---
            useEffect(() => {
                const enablePersistence = async () => {
                    if (navigator.storage && navigator.storage.persist) {
                        const granted = await navigator.storage.persist();
                        setIsPersistent(granted);
                        console.log("Persistente Speicherung:", granted);
                    }
                };
                enablePersistence();
                refreshData();
            }, [view, user]);

            const refreshData = () => {
                getAllEntries().then(data => setEntries(data.sort((a,b) => b.id - a.id)));
            };

            const processImage = (file) => {
                if (!file) return;
                setIsCompressing(true);
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const MAX_W = 1000;
                        let w = img.width, h = img.height;
                        if (w > MAX_W) { h = Math.round((MAX_W / w) * h); w = MAX_W; }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        setCaptureData(prev => ({ ...prev, images: [...prev.images, canvas.toDataURL('image/jpeg', 0.5)] }));
                        setIsCompressing(false);
                    };
                };
                reader.readAsDataURL(file);
            };

            const sendEmail = (entry) => {
                const subject = encodeURIComponent(`VUD Augsburg Protokoll: ${entry.street}`);
                const body = encodeURIComponent(
                    `DIENSTLICHES PROTOKOLL - VÜD AUGSBURG\n` +
                    `--------------------------------------\n` +
                    `Bearbeiter: ${entry.officerId}\n` +
                    `Zeitstempel: ${entry.timestamp}\n` +
                    `Status: ${entry.status}\n\n` +
                    `STANDORT:\n` +
                    `Straße: ${entry.street}\n` +
                    `Bezirk: ${entry.district}\n\n` +
                    `FESTSTELLUNGEN:\n` +
                    `${entry.description || 'Keine Angabe'}\n\n` +
                    `ANZAHL FOTOS: ${entry.images.length}\n` +
                    `--------------------------------------\n` +
                    `Hinweis: Bilder sind im digitalen Dienstportal unter ${window.location.origin} abrufbar.`
                );
                window.location.href = `mailto:?subject=${subject}&body=${body}`;
            };

            const toggleStatus = async (id) => {
                const updated = entries.map(e => {
                    if (e.id === id) {
                        const n = { ...e, status: e.status === 'ERLEDIGT' ? 'AKTIV' : 'ERLEDIGT' };
                        saveEntry(n);
                        return n;
                    }
                    return e;
                });
                setEntries(updated);
            };

            const addEntry = async () => {
                if (captureData.street && captureData.images.length > 0) {
                    const n = { ...captureData, id: Date.now(), status: 'AKTIV', timestamp: new Date().toLocaleString('de-DE'), officerId: user.name };
                    await saveEntry(n);
                    setCaptureData({ street: '', district: DISTRICTS[0], description: '', images: [] });
                    setView('DASHBOARD');
                }
            };

            const filteredEntries = useMemo(() => {
                const s = searchTerm.toLowerCase();
                return entries
                    .filter(e => e.street.toLowerCase().includes(s) || e.district.toLowerCase().includes(s))
                    .sort((a,b) => (a.status === b.status ? b.id - a.id : a.status === 'AKTIV' ? -1 : 1));
            }, [entries, searchTerm]);

            if (!user) {
                return (
                    <div className="min-h-screen bg-black flex flex-col items-center justify-center p-8">
                        <img src="logo.PNG" className="w-44 h-44 mb-10 shadow-[0_0_50px_rgba(212,175,55,0.1)]" />
                        <h1 className="font-luxury text-2xl gold-text tracking-widest uppercase mb-12">Portal Login</h1>
                        <input id="l_name" placeholder="DIENST-ID (z.B. VÜD-123)" className="w-full max-w-xs p-5 bg-zinc-900 border border-zinc-800 gold-text uppercase text-xs font-bold outline-none search-glow mb-4" />
                        <button onClick={() => { if(document.getElementById('l_name').value) setUser({name: document.getElementById('l_name').value}) }} className="w-full max-w-xs py-5 gold-button">Dienstantritt</button>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-black flex flex-col relative border-x border-zinc-900">
                    
                    {/* LIGHTBOX */}
                    {zoomPhoto && (
                        <div className="fixed inset-0 bg-black/98 z-[9999] flex items-center justify-center p-4 modal-entry" onClick={() => setZoomPhoto(null)}>
                            <button className="absolute top-10 right-10 text-white/40"><i className="lucide-x text-4xl"></i></button>
                            <img src={zoomPhoto} className="max-w-full max-h-[80vh] object-contain border border-zinc-800" />
                        </div>
                    )}

                    <header className="h-20 bg-black border-b border-zinc-900 px-6 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <img src="logo.PNG" className="h-10 w-10 object-contain" />
                            <span className="font-luxury text-xl gold-text tracking-widest text-[22px]">VÜD</span>
                        </div>
                        <button onClick={() => setUser(null)} className="text-zinc-700 hover:text-white"><i className="lucide-log-out text-lg"></i></button>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-32">
                        {view === 'DASHBOARD' && (
                            <div className="p-5 space-y-6">
                                <div className="flex justify-between items-center px-1">
                                    <h2 className="font-luxury text-sm gold-text tracking-normal">Statusübersicht</h2>
                                    <div className="text-[7px] font-black uppercase tracking-[0.2em] gold-text px-3 py-1 border border-[#D4AF37]/30 rounded-full">
                                        DATENSTATUS: {isPersistent ? 'GESICHERT' : 'TEMPORÄR'}
                                    </div>
                                </div>

                                <div className="relative">
                                    <i className="lucide-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-600 w-4 h-4"></i>
                                    <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Filter: Adresse oder Bezirk..." className="w-full pl-12 pr-4 py-4 bg-zinc-900/50 border border-zinc-800 rounded-2xl text-[10px] font-bold text-white uppercase outline-none search-glow" />
                                </div>

                                <div className="space-y-6">
                                    {filteredEntries.map(e => (
                                        <div key={e.id} className={`bg-zinc-900/20 border rounded-[2rem] overflow-hidden transition-all duration-500 ${e.status === 'ERLEDIGT' ? 'status-erledigt border-zinc-900' : 'border-zinc-800 shadow-2xl'}`}>
                                            <div className="relative overflow-hidden">
                                                <img src={e.images[0]} className="w-full aspect-[4/3] object-cover cursor-zoom-in" onClick={() => setZoomPhoto(e.images[0])} />
                                                <button onClick={() => toggleStatus(e.id)} className={`absolute top-4 right-4 size-10 rounded-full flex items-center justify-center border-2 backdrop-blur-md transition-all ${e.status === 'AKTIV' ? 'border-[#D4AF37] gold-text bg-black/50' : 'border-green-500 text-green-500 bg-black/50'}`}>
                                                    <i className={e.status === 'AKTIV' ? 'lucide-alert-triangle' : 'lucide-check-circle'}></i>
                                                </button>
                                                <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black to-transparent">
                                                    <div className="text-[7px] font-mono text-zinc-400">BEARBEITER: {e.officerId}</div>
                                                </div>
                                            </div>
                                            <div className="p-5 space-y-4">
                                                <div className="flex justify-between items-start">
                                                    <div className="flex-1">
                                                        <h3 className={`text-xs font-black uppercase mb-1 ${e.status === 'AKTIV' ? 'gold-text' : 'text-zinc-500'}`}>{e.street}</h3>
                                                        <p className="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">{e.district}</p>
                                                    </div>
                                                    <span className="text-[7px] font-bold text-zinc-700">{e.timestamp}</span>
                                                </div>
                                                <div className="flex gap-2 pb-2 overflow-x-auto scrollbar-none border-b border-zinc-800/50">
                                                    {e.images.map((img, i) => (
                                                        <img key={i} src={img} className="size-10 rounded-xl object-cover border border-zinc-800 cursor-zoom-in" onClick={() => setZoomPhoto(img)} />
                                                    ))}
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => sendEmail(e)} className="flex-1 py-3 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center justify-center gap-2 text-[8px] font-black uppercase gold-text active:scale-95 transition-transform">
                                                        <i className="lucide-mail text-xs"></i> Protokoll Senden
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    <button onClick={() => setView('AUFNAHME')} className="w-full py-10 border-2 border-dashed border-zinc-900 rounded-[2.5rem] flex flex-col items-center gap-2 text-zinc-800 hover:text-white transition-colors">
                                        <i className="lucide-camera text-4xl"></i>
                                        <span className="text-[9px] font-black uppercase tracking-widest">Neue Beweisaufnahme</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'AUFNAHME' && (
                            <div className="p-6 space-y-6">
                                <div className="flex items-center gap-4"><button onClick={() => setView('DASHBOARD')} className="p-2 text-zinc-700 hover:text-white"><i className="lucide-arrow-left"></i></button><h2 className="font-luxury gold-text tracking-widest text-sm text-center flex-1 uppercase">Beweisaufnahme</h2></div>
                                
                                <div className="grid grid-cols-3 gap-3">
                                    <div onClick={() => fileRef.current.click()} className="aspect-square bg-zinc-900/50 border border-zinc-800 rounded-3xl flex flex-col items-center justify-center cursor-pointer shadow-inner hover:border-[#D4AF37] text-zinc-700 hover:text-[#D4AF37] transition-all">
                                        {isCompressing ? <i className="lucide-loader-2 animate-spin"></i> : <i className="lucide-camera text-2xl"></i>}
                                        <input type="file" accept="image/*" capture="environment" className="hidden" ref={fileRef} onChange={e => processImage(e.target.files[0])} />
                                    </div>
                                    {captureData.images.map((img, i) => (
                                        <div key={i} className="aspect-square rounded-3xl overflow-hidden relative border border-zinc-800">
                                            <img src={img} className="w-full h-full object-cover cursor-zoom-in" onClick={() => setZoomPhoto(img)} />
                                            <button onClick={() => setCaptureData(prev => ({...prev, images: prev.images.filter((_, idx) => idx !== i)}))} className="absolute top-1 right-1 size-6 bg-black/60 rounded-full flex items-center justify-center text-red-500"><i className="lucide-trash-2 text-[10px]"></i></button>
                                        </div>
                                    ))}
                                </div>

                                <div className="space-y-4 pt-4">
                                    <input value={captureData.street} onChange={e => setCaptureData({...captureData, street: e.target.value.toUpperCase()})} placeholder="ADRESSE / STANDORT" className="w-full p-5 bg-zinc-900 border border-zinc-800 rounded-2xl text-[11px] font-bold outline-none gold-text search-glow uppercase" />
                                    <select value={captureData.district} onChange={e => setCaptureData({...captureData, district: e.target.value})} className="w-full p-5 bg-zinc-900 border border-zinc-800 rounded-2xl text-[10px] font-black gold-text uppercase outline-none">
                                        {DISTRICTS.map(d => <option key={d} value={d} className="bg-black">{d}</option>)}
                                    </select>
                                    <textarea value={captureData.description} onChange={e => setCaptureData({...captureData, description: e.target.value})} placeholder="DIENSTLICHE BEMERKUNG..." className="w-full p-5 bg-zinc-900 border border-zinc-800 rounded-2xl text-[10px] italic min-h-[120px] outline-none text-zinc-400" />
                                    <button onClick={addEntry} disabled={captureData.images.length === 0} className="w-full py-6 gold-button rounded-2xl shadow-xl disabled:opacity-30">PROTOKOLL SIGNIEREN</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="h-24 bg-black border-t border-zinc-900 flex items-center justify-around px-2 z-50 fixed bottom-0 w-full max-md shadow-[0_-10px_30px_rgba(0,0,0,0.9)]">
                        <button onClick={() => setView('DASHBOARD')} className={`flex flex-col items-center gap-1 flex-1 py-1 ${view === 'DASHBOARD' ? 'gold-text' : 'text-zinc-700'}`}><i className="lucide-layout-grid text-xl"></i><span className="text-[8px] font-black uppercase tracking-widest">Journal</span></button>
                        <button onClick={() => setView('AUFNAHME')} className={`flex flex-col items-center gap-1 flex-1 py-1 ${view === 'AUFNAHME' ? 'gold-text' : 'text-zinc-700'}`}><i className="lucide-camera text-xl"></i><span className="text-[8px] font-black uppercase tracking-widest">Foto</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
